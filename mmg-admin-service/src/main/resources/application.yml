spring:
  application:
    name: mmg-admin-service
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${ADMIN_DB_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    show-sql: true

server:
  port: 8083

cors:
  allowed-origins: http://localhost:5173

# mmg-common ConstJwt 바인딩용 — JWT secret만 .env에서 (시크릿)
constants:
  jwt:
    issuer: green502@green.com
    bearer-format: JWT
    claim-key: signedUser
    secret-key: ${JWT_SECRET}
    access-token-cookie-name: access-token
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1296000
    access-token-validity-milliseconds: 1296000000
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-path: /api/user/reissue
    refresh-token-cookie-validity-seconds: 1296000
    refresh-token-validity-milliseconds: 1296000000

app:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com
    default-model: gemini-2.5-flash
    lite-model: gemini-2.0-flash

feign:
  auth-service:
    url: http://localhost:8081
  main-service:
    url: http://localhost:8080
  rider-service:
    url: http://localhost:8082
  okhttp:
    enabled: true
