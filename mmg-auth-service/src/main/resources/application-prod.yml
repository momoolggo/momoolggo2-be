spring:
  application:
    name: mmg-auth-service
  config:
    import:
      - optional:file:.env.prod[.properties]
      - classpath:application-redis-prod.yml
      - classpath:application-kafka-prod.yml
  datasource:
    url: ${AUTH_DB_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mappers/*.xml

# JPA + MyBatis 하이브리드 (Phase 3-A) — 단순 CRUD는 JPA, 복잡 쿼리는 MyBatis 영구 공존
spring.jpa:
  hibernate:
    ddl-auto: none          # ⚠️ validate 외 값 절대 금지 (스키마 변경 X)
    naming.physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  open-in-view: false           # Lazy proxy 트랜잭션 밖 사용 차단
  properties:
    hibernate:
      dialect: org.hibernate.dialect.MariaDBDialect
      format_sql: true
  show-sql: true

# mmg-common ConstJwt 바인딩용 — 시크릿/만료는 .env에서 주입
constants:
  jwt:
    issuer: ${JWT_ISSUER}
    bearer-format: JWT
    claim-key: signedUser
    secret-key: ${JWT_SECRET}
    access-token-cookie-name: access-token
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1296000
    access-token-validity-milliseconds: ${JWT_ACCESS_TOKEN_VALIDITY_MS}
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-path: /api/user/reissue
    refresh-token-cookie-validity-seconds: 1296000
    refresh-token-validity-milliseconds: ${JWT_REFRESH_TOKEN_VALIDITY_MS}
