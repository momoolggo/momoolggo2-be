spring:
  application:
    name: mmg-auth-service
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${AUTH_DB_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
      password:

server:
  port: 8081

cors:
  allowed-origins: http://localhost:5173

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mappers/*.xml

# JPA + MyBatis 하이브리드 (Phase 3-A) — 단순 CRUD는 JPA, 복잡 쿼리는 MyBatis 영구 공존
spring.jpa:
  hibernate:
    ddl-auto: validate          # ⚠️ validate 외 값 절대 금지 (스키마 변경 X)
    naming.physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  open-in-view: false           # Lazy proxy 트랜잭션 밖 사용 차단
  properties:
    hibernate:
      dialect: org.hibernate.dialect.MariaDBDialect
      format_sql: true
  show-sql: true

# mmg-common ConstJwt 바인딩용 — JWT secret만 .env에서 (시크릿)
constants:
  jwt:
    issuer: green502@green.com
    bearer-format: JWT
    claim-key: signedUser
    secret-key: ${JWT_SECRET}
    access-token-cookie-name: access-token
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1296000
    access-token-validity-milliseconds: 1296000000
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-path: /api/user/reissue
    refresh-token-cookie-validity-seconds: 1296000
    refresh-token-validity-milliseconds: 1296000000
