spring:
  application:
    name: mmg-main-service
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${MAIN_DB_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mappers/*.xml

# JPA + MyBatis 하이브리드 (Phase 3-B) — 단순 CRUD는 JPA, JOIN/집계는 MyBatis 영구 공존
spring.jpa:
  hibernate:
    ddl-auto: validate          # ⚠️ validate 외 값 절대 금지 (스키마 변경 X)
    naming.physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  open-in-view: false
  properties:
    hibernate:
      dialect: org.hibernate.dialect.MariaDBDialect   # 자동감지 시 학원 MariaDB INFORMATION_SCHEMA의 'RESERVED' 컬럼 부재로 실패 → 명시
      format_sql: true
  show-sql: true

# 이미지 업로드 (main-service 단독 책임 — CLAUDE.md §5)
file:
  upload:
    menu-path:   ${MENU_UPLOAD_PATH}
    store-path:  ${STORE_UPLOAD_PATH}
    review-path: ${REVIEW_UPLOAD_PATH}
    pet-path:    ${PET_UPLOAD_PATH}

# 토스페이먼츠 시크릿 키 (Phase 5에서 실제 학원 키로 교체 예정 — 현재 .env에 placeholder)
toss:
  secret-key: ${TOSS_SECRET_KEY}

# 네이버 API (지도/검색 — main-service만 사용, CLAUDE.md §2)
naver:
  client-id: ${NAVER_CLIENT_ID}
  client-secret: ${NAVER_CLIENT_SECRET}
  map-client-id: ${NAVER_MAP_CLIENT_ID}
  search-client-id: ${NAVER_SEARCH_CLIENT_ID}
  search-client-secret: ${NAVER_SEARCH_CLIENT_SECRET}

# mmg-common ConstJwt 바인딩용 (인증 검증을 위해 main도 동일 시크릿 사용)
constants:
  jwt:
    issuer: ${JWT_ISSUER}
    bearer-format: JWT
    claim-key: signedUser
    secret-key: ${JWT_SECRET}
    access-token-cookie-name: access-token
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1296000
    access-token-validity-milliseconds: ${JWT_ACCESS_TOKEN_VALIDITY_MS}
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-path: /api/user/reissue
    refresh-token-cookie-validity-seconds: 1296000
    refresh-token-validity-milliseconds: ${JWT_REFRESH_TOKEN_VALIDITY_MS}
